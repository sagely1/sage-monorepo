type: object
description: Marmoset Model Overview object for comparison tools
properties:
  _id:
    type: string
    description: Unique identifier for the marmoset model overview object
  name:
    type: string
    description: Model name
  model_type:
    type: string
    description: Model type (e.g., Late Onset AD, Familial AD)
  biomarkers:
    $ref: ./Link.yaml
    nullable: true
  study_data:
    $ref: ./Link.yaml
  modified_genes:
    type: array
    items:
      type: string
    description: List of modified genes in the model
  available_data:
    type: array
    items:
      type: string
      enum:
        - Plasma Biomarkers
required:
  - _id
  - name
  - model_type
  - study_data
  - modified_genes
  - available_data
