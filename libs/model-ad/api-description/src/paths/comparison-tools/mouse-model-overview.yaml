get:
  tags:
    - Mouse Model Overview
  summary: Get mouse model overview for comparison tools
  description: Returns a paginated list of mouse model overview objects for use in comparison tools.
  operationId: getMouseModelOverviews
  parameters:
    - $ref: ../query/mouseModelOverviewSearchQuery.yaml
  responses:
    '200':
      description: A paginated list of mouse model overview objects
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/MouseModelOverviewsPage.yaml
    '400':
      $ref: ../../components/responses/BadRequest.yaml
    '404':
      $ref: ../../components/responses/NotFound.yaml
    '500':
      $ref: ../../components/responses/InternalServerError.yaml
