get:
  tags:
    - Marmoset Model Overview
  summary: Get marmoset model overview for comparison tools
  description: Returns a paginated list of marmoset model overview objects for use in comparison tools.
  operationId: getMarmosetModelOverviews
  parameters:
    - $ref: ../query/marmosetModelOverviewSearchQuery.yaml
  responses:
    '200':
      description: A paginated list of marmoset model overview objects
      content:
        application/json:
          schema:
            $ref: ../../components/schemas/MarmosetModelOverviewsPage.yaml
    '400':
      $ref: ../../components/responses/BadRequest.yaml
    '404':
      $ref: ../../components/responses/NotFound.yaml
    '500':
      $ref: ../../components/responses/InternalServerError.yaml
